<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>CutPro Web</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<style>
:root{
  --bg:#111;
  --panel:#1e1e1e;
  --panel2:#252525;
  --border:#2a2a2a;
  --text:#d8d8d8;
  --muted:#888;
  --accent:#4a8fcd;
  --playhead:#e8a020;
  font-family:"Lucida Grande","Helvetica Neue",Arial,sans-serif;
  font-size:11px;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%;overflow:hidden;background:var(--bg);color:var(--text)}
#app{display:flex;flex-direction:column;height:100%}

/* Toolbar */
#toolbar{
  height:38px;display:flex;align-items:center;
  gap:6px;padding:0 8px;
  background:linear-gradient(#3a3a3a,#262626);
  border-bottom:1px solid #111;
}
.tool-btn{
  height:26px;min-width:26px;
  background:linear-gradient(#3e3e3e,#292929);
  border:1px solid #1a1a1a;
  border-top-color:#4a4a4a;
  border-radius:3px;color:var(--text);
  cursor:pointer;
}
.tool-btn.active{
  background:linear-gradient(#1e3a5a,#162a42);
  border-color:var(--accent);
}

/* Layout */
#workspace{flex:1;display:flex}

/* Browser */
#browser{
  width:240px;background:var(--panel);
  border-right:1px solid #111;
  display:flex;flex-direction:column;
}
.panel-header{
  height:20px;padding:0 8px;
  display:flex;align-items:center;
  font-size:10px;font-weight:bold;
  text-transform:uppercase;color:#aaa;
  background:linear-gradient(#333,#252525);
  border-bottom:1px solid #111;
}
#bin{flex:1;overflow:auto}
.bin-item{padding:4px 6px;border-bottom:1px solid #222;cursor:grab}

/* Center */
#center{flex:1;display:flex;flex-direction:column}
#viewers{flex:1;display:flex;border-bottom:2px solid #111}
.viewer-panel{flex:1;background:var(--panel);position:relative}
.viewer-screen{position:absolute;inset:0;background:#000}
.viewer-label{position:absolute;top:6px;left:8px;font-size:9px;color:rgba(255,255,255,.4)}

/* Timeline */
#timeline{height:220px;background:#111;display:flex;flex-direction:column}
#timeline-toolbar{
  height:28px;padding:0 8px;
  display:flex;align-items:center;
  background:linear-gradient(#2e2e2e,#242424);
  border-bottom:1px solid #111;
}
#timeline-content{flex:1;display:flex}
#track-headers{width:120px;background:var(--panel2);border-right:1px solid #111}
.track-header{height:40px;display:flex;align-items:center;padding:0 6px;font-size:10px;color:#aaa;border-bottom:1px solid #111}

#tracks{flex:1;position:relative;overflow:auto}
.timeline-ruler{
  height:20px;border-bottom:1px solid #222;
  background:#1a1a1a;font-size:9px;color:#888;
  display:flex;align-items:flex-end;
}
.timeline-track{height:40px;border-bottom:1px solid #111;position:relative}

.clip{
  position:absolute;top:4px;bottom:4px;
  background:linear-gradient(#3a6a9a,#2a4e74,#1e3850);
  border:1px solid #1a3a6a;border-radius:3px;
  padding:0 6px;font-size:9px;color:#fff;
  display:flex;align-items:center;cursor:grab;
}
.clip.selected{outline:2px solid var(--accent)}
.clip::after{
  content:"";position:absolute;right:-6px;top:0;bottom:0;
  width:6px;cursor:ew-resize;
}

#playhead{
  position:absolute;top:0;bottom:0;
  width:2px;background:var(--playhead);z-index:50;
}

/* Inspector */
#inspector{
  width:220px;background:var(--panel);
  border-left:1px solid #111;
}
.inspector-section{border-bottom:1px solid #111}
.inspector-title{
  height:20px;padding:0 8px;
  display:flex;align-items:center;
  background:linear-gradient(#2e2e2e,#242424);
  font-size:10px;text-transform:uppercase;
}
.inspector-body{padding:6px 8px}
.param-row{display:flex;gap:6px;margin-bottom:6px}
.param-label{width:60px;font-size:10px;color:#aaa}

/* Status */
#statusbar{
  height:18px;padding:0 8px;
  display:flex;align-items:center;
  background:linear-gradient(#1e1e1e,#161616);
  border-top:1px solid #111;
  font-size:9px;color:var(--muted);
}

/* Rubber band */
#rubber{
  position:absolute;border:1px dashed var(--accent);
  background:rgba(74,143,205,.1);
  pointer-events:none;display:none;z-index:999;
}
</style>
</head>

<body>
<div id="app">

<div id="toolbar">
  <button class="tool-btn active" id="tool-select">A</button>
  <button class="tool-btn" id="tool-blade">B</button>
  <button class="tool-btn" id="btn-play">▶</button>
</div>

<div id="workspace">

<div id="browser">
  <div class="panel-header">Browser</div>
  <div id="bin"></div>
  <input type="file" id="fileInput" multiple hidden />
</div>

<div id="center">
  <div id="viewers">
    <div class="viewer-panel">
      <div class="viewer-screen"></div>
      <div class="viewer-label">SOURCE</div>
    </div>
    <div class="viewer-panel">
      <canvas id="canvas" width="1280" height="720"></canvas>
      <div class="viewer-label">SEQUENCE</div>
    </div>
  </div>

  <div id="timeline">
    <div id="timeline-toolbar">Timeline</div>
    <div id="timeline-content">
      <div id="track-headers">
        <div class="track-header">V1</div>
      </div>
      <div id="tracks">
        <div class="timeline-ruler" id="ruler"></div>
        <div class="timeline-track" id="track-v1"></div>
        <div id="playhead"></div>
        <div id="rubber"></div>
      </div>
    </div>
  </div>
</div>

<div id="inspector">
  <div class="panel-header">Inspector</div>
  <div class="inspector-section">
    <div class="inspector-title">Motion</div>
    <div class="inspector-body">
      <div class="param-row">
        <span class="param-label">Scale</span>
        <input type="range" id="scale" min="50" max="200" value="100" />
      </div>
    </div>
  </div>
</div>

</div>

<div id="statusbar">Phase 3 — Timeline stabilized</div>
</div>

<script>
/* ================= BOOT ================= */
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

/* ================= STATE ================= */
const PX = 20;
const state = {
  clips: [],
  selected: new Set(),
  tool: "select",
  playing: false
};

/* ================= RULER ================= */
function drawRuler(){
  const r=document.getElementById("ruler");
  r.innerHTML="";
  for(let i=0;i<60;i+=5){
    const t=document.createElement("div");
    t.textContent=`${i}s`;
    t.style.width=(5*PX)+"px";
    t.style.borderLeft="1px solid #333";
    r.appendChild(t);
  }
}
drawRuler();

/* ================= BIN ================= */
fileInput.onchange=e=>{
  [...e.target.files].forEach(f=>{
    const v=document.createElement("video");
    v.src=URL.createObjectURL(f);
    v.muted=true;
    state.clips.push({id:crypto.randomUUID(),file:f,video:v,start:0,dur:5});
    const b=document.createElement("div");
    b.className="bin-item";
    b.textContent=f.name;
    b.draggable=true;
    b.ondragstart=ev=>ev.dataTransfer.setData("id",state.clips.at(-1).id);
    bin.appendChild(b);
  });
};

/* ================= TIMELINE ================= */
track-v1.ondragover=e=>e.preventDefault();
track-v1.ondrop=e=>{
  const clip=state.clips.find(c=>c.id===e.dataTransfer.getData("id"));
  clip.start=e.offsetX/PX;
  state.clips.push({...clip,id:crypto.randomUUID()});
  render();
};

function render(){
  track-v1.innerHTML="";
  state.clips.forEach(c=>{
    const el=document.createElement("div");
    el.className="clip"+(state.selected.has(c)?" selected":"");
    el.style.left=(c.start*PX)+"px";
    el.style.width=(c.dur*PX)+"px";
    el.textContent=c.file.name;
    el.onclick=e=>{
      if(state.tool==="blade"){
        const cut=c.start+(e.offsetX/PX);
        if(cut>c.start&&cut<c.start+c.dur){
          const rDur=(c.start+c.dur)-cut;
          c.dur=cut-c.start;
          state.clips.push({...c,id:crypto.randomUUID(),start:cut,dur:rDur});
          render();return;
        }
      }
      state.selected.clear();state.selected.add(c);render();
    };
    track-v1.appendChild(el);
  });
}
render();

/* ================= CANVAS ================= */
function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  state.selected.forEach(c=>{
    if(c.video.readyState>=2){
      ctx.drawImage(c.video,0,0,canvas.width,canvas.height);
    }
  });
  requestAnimationFrame(draw);
}
draw();

/* ================= TOOLS ================= */
toolSelect.onclick=()=>state.tool="select";
toolBlade.onclick=()=>state.tool="blade";

document.addEventListener("keydown",e=>{
  if(e.key===" "){e.preventDefault();state.playing=!state.playing}
});
</script>
</body>
</html>
