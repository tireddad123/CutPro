<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>CutPro Web — Final</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#0f1115" />

<style>
:root{
  --bg:#0f1115;--panel:#171a21;--border:#2a2f3a;
  --text:#e8eaed;--muted:#9aa0a6;--accent:#4ea1ff;
  --video:#4ea1ff;--audio:#53d36b;
  font-family:system-ui,sans-serif;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{
  background:var(--bg);color:var(--text);
  display:grid;grid-template-rows:auto 1fr auto;
}
header,footer{
  background:var(--panel);
  border:1px solid var(--border);
}
header{
  display:flex;align-items:center;gap:6px;
  padding:6px 10px;border-bottom:none
}
header h1{font-size:1rem;margin-right:8px}
main{
  display:grid;
  grid-template-columns:260px 1fr 300px;
  overflow:hidden
}
aside,section{border-right:1px solid var(--border);overflow:hidden}
aside:last-child{border-right:none}
.panel-title{
  font-size:.65rem;text-transform:uppercase;
  color:var(--muted);padding:6px 8px;
