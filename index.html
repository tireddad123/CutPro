<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />

<style>
/* ===================== VARIABLES ===================== */
:root{
  --bg:#0f0f10; --panel:#1c1c1e; --panel2:#202022; --line:#111; --text:#d8d8d8;
  --muted:#8b8b8b; --accent:#3b82f6; --warn:#fbbf24;
  --browserW:240px; --inspectorW:300px; --timelineH:260px;
  --trackH:48px; --pxPerSec:100px; --rulerH:22px;
  font-family:system-ui,-apple-system,Segoe UI,sans-serif;
}
/* ===================== RESET ===================== */
*{box-sizing:border-box}
html,body{margin:0;height:100%;background:var(--bg);color:var(--text);overflow:hidden}

/* ===================== ROOT GRID ===================== */
body{display:grid;grid-template-rows:42px 1fr var(--timelineH);}

/* ===================== TOP BAR ===================== */
#topbar{
  display:grid;grid-template-columns:1fr auto 1fr;align-items:center;
  gap:8px;padding:0 10px;
  background:linear-gradient(#2a2a2c,#202022);
  border-bottom:1px solid var(--line);
}
#topbar .left,#topbar .right{display:flex;gap:6px;align-items:center}
#topbar .center{justify-self:center;font-variant-numeric:tabular-nums;color:#00dd00;font-weight:600}
.tool-btn{height:28px;min-width:28px;padding:0 8px;background:#2b2b2e;border:1px solid #000;color:#ddd;border-radius:4px;cursor:pointer}
.tool-btn.active{background:#1e3a5a;border-color:#0b274e}

/* ===================== MAIN GRID ===================== */
#app{display:grid;grid-template-columns:var(--browserW) 1fr var(--inspectorW);overflow:hidden}

/* ===================== BROWSER ===================== */
#browser{
  background:linear-gradient(#202022,#18181a);
  border-right:1px solid var(--line);
  display:flex;flex-direction:column;overflow:hidden;
}
.browser-header{padding:8px 10px;font-size:11px;color:var(--muted);text-transform:uppercase;border-bottom:1px solid var(--line)}
#bin{flex:1;overflow:auto;padding:0 8px}
#drop-zone{
  position:sticky;bottom:0;margin:10px;padding:14px;
  border:2px dashed #3b6fa6;border-radius:6px;
  color:#8fb3d9;text-align:center;cursor:pointer;
}
.bin-item{padding:6px;border-bottom:1px solid #252525;cursor:grab;display:flex;gap:8px;align-items:center}
.bin-thumb{width:42px;height:28px;background:#000;border:1px solid #333;font-size:9px;color:#bbb;display:flex;align-items:center;justify-content:center}

/* ===================== VIEWERS ===================== */
#center{display:flex;flex-direction:column;overflow:hidden}
#viewers{flex:1;display:grid;grid-template-columns:1fr 1fr;gap:6px;padding:6px;background:#0b0b0c}
.viewer-panel{display:grid;grid-template-rows:24px 1fr 56px;background:var(--panel);border:1px solid #111;overflow:hidden}
.panel-header{padding:0 8px;font-size:11px;color:#8a8a8a;display:flex;align-items:center;border-bottom:1px solid #0c0c0d}
.viewer-screen{background:#000;display:flex;align-items:center;justify-content:center;position:relative;aspect-ratio:16/9}
.viewer-screen video, canvas{max-width:100%;max-height:100%}

/* ===================== TIMELINE ===================== */
#timeline{display:grid;grid-template-rows:30px 1fr;border-top:1px solid var(--line)}
#timeline .controls{display:flex;align-items:center;gap:10px;padding:0 8px;font-size:11px}
#timeline .body{display:grid;grid-template-columns:180px 1fr;overflow:hidden}
#track-headers{border-right:1px solid var(--line);overflow:auto}
.track-header{height:var(--trackH);display:flex;align-items:center;padding:0 8px;border-bottom:1px solid var(--line)}
.tracks{position:relative;overflow:auto;padding-top:var(--rulerH)}
.timeline-track{height:var(--trackH);border-bottom:1px solid #191919;position:relative}
.clip{position:absolute;top:3px;bottom:3px;border-radius:4px;padding:0 6px;font-size:10px;display:flex;align-items:center;cursor:grab}
.clip.selected{outline:2px solid var(--accent)}
.clip.audio-clip{background:#3b7a4b}
.clip.video-clip{background:#3576d6}
.clip-handle{position:absolute;top:0;bottom:0;width:6px;cursor:ew-resize}
.clip-handle.left{left:0}
.clip-handle.right{right:0}

</style>
</head>

<body>

<!-- ===================== TOP BAR ===================== -->
<div id="topbar">
  <div class="left">
    <button class="tool-btn active" id="toolSelect">⬆</button>
    <button class="tool-btn" id="toolBlade">✂</button>
    <button class="tool-btn" id="toolHand">✋</button>
    <button class="tool-btn" id="toolZoom">🔍</button>
    <button class="tool-btn active" id="snapBtn">🧲</button>
  </div>
  <div class="center">00:00:00:00</div>
  <div class="right">
    <button class="tool-btn" id="btn-insert">Insert</button>
    <button class="tool-btn" id="btn-overwrite">Overwrite</button>
  </div>
</div>

<!-- ===================== WORKSPACE ===================== -->
<div id="app">

<!-- Browser -->
<aside id="browser">
  <div class="browser-header">Browser</div>
  <div id="bin"></div>
  <div id="drop-zone">Drop video here</div>
</aside>

<!-- Center -->
<main id="center">
  <div id="viewers">
    <section class="viewer-panel">
      <div class="panel-header">Viewer · Source</div>
      <div class="viewer-screen">
        <video id="sourceVideo" controls></video>
      </div>
    </section>
    <section class="viewer-panel">
      <div class="panel-header">Canvas · Program</div>
      <div class="viewer-screen">
        <canvas id="programCanvas"></canvas>
      </div>
    </section>
  </div>
</main>

<!-- Inspector -->
<aside id="inspector">
  <div class="browser-header">Inspector</div>
  <div id="inspectorMain">No selection</div>
</aside>

</div>

<!-- ===================== TIMELINE ===================== -->
<div id="timeline">
  <div class="controls">
    <span>Timeline</span>
  </div>
  <div class="body">
    <div id="track-headers">
      <div class="track-header">V1</div>
      <div class="track-header">A1</div>
    </div>
    <div class="tracks" id="timeline-tracks">
      <div class="timeline-track" id="track-v1" data-track="v1"></div>
      <div class="timeline-track" id="track-a1" data-track="a1"></div>
    </div>
  </div>
</div>

<script>
/* ===================== STATE ===================== */
const tl = {
  clips: [],
  timeline: [],
  playhead: 0,
  zoom: 3,
  seqDuration: 60,
  playing: false,
  snapping: true,
  selectedId: null
};

/* ===================== HELPERS ===================== */
function secToPx(s){ return s * tl.zoom * 10 }
function pxToSec(px){ return px / (tl.zoom * 10) }
function formatTC(s){
  const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec=Math.floor(s%60),f=Math.floor((s%1)*30);
  return [h,m,sec,f].map(v=>String(v).padStart(2,'0')).join(':');
}

/* ===================== RENDER PROGRAM ===================== */
function renderProgram(){
  const c=document.getElementById('programCanvas');
  const ctx=c.getContext('2d');
  c.width=1280; c.height=720;
  ctx.fillStyle="#000"; ctx.fillRect(0,0,c.width,c.height);

  const active = tl.timeline.filter(e =>
    tl.playhead>=e.start && tl.playhead<=e.start+e.duration
  );

  active.forEach(e=>{
    const clip = tl.clips.find(c=>c.id===e.clipId);
    if(!clip || clip.type!=='video') return;
    const v = clip._el;
    if(!v) return;

    const mt = Math.min(e.outPoint ?? v.duration, e.inPoint + (tl.playhead-e.start));
    if(Math.abs(v.currentTime-mt)>0.05) v.currentTime=mt;

    ctx.drawImage(v,0,0,c.width,c.height);
  });
}

/* ===================== PLAYBACK ===================== */
function togglePlay(){
  tl.playing=!tl.playing;
  const step=()=>{
    if(!tl.playing) return;
    tl.playhead+=1/30;
    if(tl.playhead>tl.seqDuration) tl.playhead=0;
    renderProgram();
    requestAnimationFrame(step);
  };
  if(tl.playing) step();
}

document.getElementById('btn-insert').onclick=togglePlay;
</script>

</body>
</html>
