<body>

  <!-- Unified Top Bar -->
  <div id="topbar">
    <div class="top-left">
      <button>Auto‑Cut</button>
      <button>Export</button>
    </div>
    <div class="top-center">00:00:00:00</div>
    <div class="top-right">
      <button>Clean</button>
      <button>Render</button>
    </div>
  </div>

  <!-- Workspace -->
  <div id="workspace">

    <!-- Browser -->
    <aside id="browser">
      <div class="panel-header">Browser</div>
      <div class="panel-body">
        <input type="file" multiple />
        <div class="drop-hint">Drop media here</div>
      </div>
    </aside>

    <!-- Viewers -->
    <main id="viewers">

      <!-- Source Viewer -->
      <section class="viewer">
        <div class="viewer-header">Viewer</div>
        <div class="viewer-surface">
          <canvas id="sourceCanvas"></canvas>
        </div>
        <div class="viewer-transport">▶ ⏸ ⏹</div>
      </section>

      <!-- Program Viewer -->
      <section class="viewer">
        <div class="viewer-header">Canvas</div>
        <div class="viewer-surface">
          <canvas id="programCanvas"></canvas>
        </div>
        <div class="viewer-transport">▶ ⏸ ⏹</div>
      </section>

    </main>

    <!-- Inspector -->
    <aside id="inspector">
      <div class="panel-header">Inspector</div>
      <div class="panel-body">
        <!-- Inspector content injected by JS -->
      </div>
    </aside>

  </div>

  <!-- Timeline -->
  <div id="timeline">

    <div id="timeline-header">
      <span>Snapping</span>
      <span>Linked</span>
    </div>

    <div id="timeline-body">
      <div id="track-headers">
        <div>V2</div>
        <div>V1</div>
        <div>A1</div>
      </div>

      <div id="tracks">
        <!-- Clips / playhead rendered here -->
      </div>
    </div>

  </div>

</body>
``
