<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>CutPro Web</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<style>
:root{
  --bg:#111;
  --panel:#1e1e1e;
  --panel2:#252525;
  --border:#2a2a2a;
  --text:#d8d8d8;
  --muted:#888;
  --accent:#4a8fcd;
  --playhead:#e8a020;
  font-family:"Lucida Grande","Helvetica Neue",Arial,sans-serif;
  font-size:11px;
}

*{box-sizing:border-box}
html,body{margin:0;height:100%;overflow:hidden;background:var(--bg);color:var(--text)}

#app{display:flex;flex-direction:column;height:100%}

/* ───────── TOOLBAR ───────── */
#toolbar{
  height:38px;
  display:flex;
  align-items:center;
  gap:6px;
  padding:0 8px;
  background:linear-gradient(#3a3a3a,#262626);
  border-bottom:1px solid #111;
}
.tool-btn{
  height:26px;min-width:26px;
  background:linear-gradient(#3e3e3e,#292929);
  border:1px solid #1a1a1a;
  border-top-color:#4a4a4a;
  border-radius:3px;
  color:var(--text);
  cursor:pointer;
}
.tool-btn.active{
  background:linear-gradient(#1e3a5a,#162a42);
  border-color:var(--accent);
}
.tool-sep{width:1px;height:22px;background:#444;margin:0 4px}

/* ───────── WORKSPACE ───────── */
#workspace{flex:1;display:flex}

/* ───────── BROWSER ───────── */
#browser{
  width:240px;
  background:var(--panel);
  border-right:1px solid #111;
  display:flex;flex-direction:column;
}
.panel-header{
  height:20px;
  display:flex;align-items:center;
  padding:0 8px;
  font-size:10px;font-weight:bold;
  text-transform:uppercase;
  color:#aaa;
  background:linear-gradient(#333,#252525);
  border-bottom:1px solid #111;
}
#bin{flex:1;overflow:auto}
.bin-item{
  padding:4px 6px;
  border-bottom:1px solid #222;
  cursor:grab;
}
