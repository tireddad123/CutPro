<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>CutPro – NLE Furniture Restored</title>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>

<style>
/* =========================================================
   CORE VARIABLES
   ========================================================= */
:root{
  --bg:#0f0f10;
  --panel:#1c1c1e;
  --panel2:#242427;
  --panel3:#2c2c2e;
  --line:#111;
  --text:#d8d8d8;
  --muted:#909090;
  --accent:#3b82f6;

  --browserW:240px;
  --inspectorW:260px;
  --timelineH:300px;
  --trackH:48px;
  --pxPerSec:100px;

  font-family:"Lucida Grande","Helvetica Neue",Arial,sans-serif;
  font-size:11px;
}

*{box-sizing:border-box}
html,body{
  margin:0;height:100%;
  background:var(--bg);color:var(--text);
  overflow:hidden;
  display:flex;
  flex-direction:column;
}

/* =========================================================
   TOP BAR (TOOLS)
   ========================================================= */
#topbar{
  height:38px;
  background:linear-gradient(#2a2a2c,#202022);
  border-bottom:1px solid var(--line);
  display:flex;
  align-items:center;
  padding:0 8px;
  gap:6px;
}
.tool-btn{
  width:30px;height:30px;
  background:#2b2b2e;
  border:1px solid var(--line);
  border-radius:4px;
  color:#ccc;
  display:flex;align-items:center;justify-content:center;
}
.tool-btn.active{
  background:#1e3a5a;
  border-color:var(--accent);
  color:#fff;
}

/* =========================================================
   APP BODY
   ========================================================= */
#app{flex:1;display:flex}

/* =========================================================
   BROWSER
   ========================================================= */
#browser{
  width:var(--browserW);
  background:linear-gradient(#202022,#18181a);
  border-right:1px solid var(--line);
  display:flex;flex-direction:column;
}
.browser-header{
  padding:8px;
  font-size:10px;
  text-transform:uppercase;
  color:var(--muted);
  border-bottom:1px solid var(--line);
}
#drop-zone{
  margin:8px;
  padding:14px;
  border:2px dashed #3b6fa6;
  border-radius:4px;
  color:#8fb3d9;
  text-align:center;
}
#bin{flex:1;overflow:auto}
.bin-item{
  display:flex;
  align-items:center;
  gap:8px;
  padding:6px;
  border-bottom:1px solid #252525;
  cursor:grab;
}
.bin-item:hover{background:#2a2a2c}
.bin-item.selected{background:#1e3a5a}
.bin-thumb{
  width:44px;height:28px;
  background:#000;border:1px solid #333;
  display:flex;align-items:center;justify-content:center;
  font-size:9px;color:#666;
}

/* =========================================================
   CENTER COLUMN
   ========================================================= */
#center{flex:1;display:flex;flex-direction:column}

/* ================= VIEWERS ================= */
#viewers{
  flex:1;
  display:flex;
  border-bottom:1px solid var(--line);
}
.viewer{
  flex:1;display:flex;flex-direction:column;
  border-right:1px solid var(--line);
}
.viewer:last-child{border-right:none}

.viewer-header{
  height:26px;background:linear-gradient(#2a2a2c,#202022);
  border-bottom:1px solid var(--line);
  padding:0 8px;
  font-size:10px;color:var(--muted);
  display:flex;align-items:center;
}
.viewer-canvas{
  flex:1;background:#000;position:relative;
}
.viewer-canvas::after{
  content:"▶";
  position:absolute;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  font-size:32px;
  color:#444;
}
.viewer-label{
  position:absolute;top:8px;left:8px;
  font-size:9px;color:#888;
}
.viewer-hud{
  position:absolute;bottom:8px;right:8px;
  font-size:9px;color:#888;
}

/* ================= TIMELINE ================= */
#timeline{
  height:var(--timelineH);
  background:linear-gradient(#131314,#0f0f10);
  border-top:1px solid var(--line);
  display:flex;
}

/* Track headers */
#track-headers{
  width:180px;
  background:linear-gradient(#202022,#18181a);
  border-right:1px solid var(--line);
}
.track-header{
  height:var(--trackH);
  display:flex;align-items:center;
  padding:0 8px;
  border-bottom:1px solid var(--line);
  color:var(--muted);
}

/* Tracks */
.tracks{
  flex:1;
  position:relative;
  background:
    linear-gradient(to right,#2a2a2e 1px,transparent 1px);
  background-size:var(--pxPerSec) 100%;
}
.track{
  height:var(--trackH);
  border-bottom:1px solid #1a1a1a;
  position:relative;
}

/* Clips */
.clip{
  position:absolute;
  top:6px;bottom:6px;
  border-radius:4px;
  padding:4px 6px;
  background:linear-gradient(#3576d6,#2559a4);
  color:#fff;
  font-size:10px;
}
.clip::before{
  content:attr(data-name);
}
.clip:hover .trim{opacity:1}
.clip.selected{outline:2px solid var(--accent)}

.trim{
  position:absolute;top:0;bottom:0;width:6px;
  background:rgba(255,255,255,0.15);
  cursor:ew-resize;
  opacity:0;
}
.trim.left{left:0}
.trim.right{right:0}

/* Playhead */
#playhead{
  position:absolute;
  top:-16px;
  width:0;height:0;
  border-left:6px solid transparent;
  border-right:6px solid transparent;
  border-bottom:10px solid var(--accent);
  left:60%;
}
#playhead-line{
  position:absolute;top:0;bottom:0;
  width:2px;background:var(--accent);
  left:calc(60% + 4px);
}

/* =========================================================
   INSPECTOR
   ========================================================= */
#inspector{
  width:var(--inspectorW);
  background:linear-gradient(#202022,#18181a);
  border-left:1px solid var(--line);
}
.inspector-header{
  padding:8px;
  font-size:10px;
  text-transform:uppercase;
  color:var(--muted);
  border-bottom:1px solid var(--line);
}
.inspector-section{
  padding:8px;
  border-bottom:1px solid #252525;
}
.inspector-label{
  font-size:10px;color:var(--muted);
  margin-bottom:6px;
}
.inspector-row{margin-bottom:8px}
.inspector-row input{width:100%}
.inspector-empty{
  padding:12px;
  color:#777;
  text-align:center;
}
</style>
</head>

<body>

<!-- TOP BAR -->
<div id="topbar">
  <div class="tool-btn active">⬆</div>
  <div class="tool-btn">✂</div>
</div>

<div id="app">

<!-- BROWSER -->
<div id="browser">
  <div class="browser-header">Browser</div>
  <div id="drop-zone">Drop video files here<br>or click to import</div>
  <div id="bin">
    <div class="bin-item selected">
      <div class="bin-thumb">MOV</div>
      Sample Clip
    </div>
  </div>
</div>

<!-- CENTER -->
<div id="center">

  <!-- VIEWERS -->
  <div id="viewers">
    <div class="viewer">
      <div class="viewer-header">Viewer</div>
      <div class="viewer-canvas">
        <div class="viewer-label">SOURCE</div>
        <div class="viewer-hud">00:00:00:00</div>
      </div>
    </div>
    <div class="viewer">
      <div class="viewer-header">Canvas</div>
      <div class="viewer-canvas">
        <div class="viewer-label">SEQUENCE</div>
        <div class="viewer-hud">00:00:00:12</div>
      </div>
    </div>
  </div>

  <!-- TIMELINE -->
  <div id="timeline">
    <div id="track-headers">
      <div class="track-header">V1</div>
      <div class="track-header">A1</div>
    </div>
    <div class="tracks">
      <div id="playhead"></div>
      <div id="playhead-line"></div>

      <div class="track">
        <div class="clip selected" data-name="Sample Clip" style="left:120px;width:300px">
          <div class="trim left"></div>
          <div class="trim right"></div>
        </div>
      </div>

      <div class="track"></div>
    </div>
  </div>

</div>

<!-- INSPECTOR -->
<div id="inspector">
  <div class="inspector-header">Inspector</div>

  <div class="inspector-section">
    <div class="inspector-label">Clip</div>
    <div class="inspector-row">
      <label>Start</label>
      <input type="number" value="1.2">
    </div>
    <div class="inspector-row">
      <label>Duration</label>
      <input type="number" value="3.0">
    </div>
  </div>

  <div class="inspector-section">
    <div class="inspector-label">Compositing</div>
    <div class="inspector-row">
      <label>Opacity</label>
      <input type="range" value="100">
    </div>
  </div>
</div>

</div>
</body>
</html>
``
