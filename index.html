<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>CutPro – Correct Layout</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<style>
/* ================= VARIABLES ================= */
:root{
  --bg:#0f0f10;
  --panel:#1c1c1e;
  --panel2:#242427;
  --text:#d8d8d8;
  --grid:#2a2a2e;
  --accent:#f0b400;

  --v2:#8b5cf6;
  --v1:#3b82f6;
  --a1:#22c55e;

  --trackH:48px;
  --pxPerSec:100px;

  font-family:"Lucida Grande","Helvetica Neue",Arial,sans-serif;
  font-size:11px;
}

*{box-sizing:border-box}
html,body{
  margin:0;
  height:100%;
  background:var(--bg);
  color:var(--text);
  overflow:hidden;
}

/* ================= APP LAYOUT ================= */
#app{
  display:flex;
  height:100%;
}

/* ================= BROWSER ================= */
#browser{
  width:240px;
  background:linear-gradient(#202022,#18181a);
  border-right:1px solid #111;
}

/* ================= CENTER COLUMN ================= */
#center{
  flex:1;
  display:flex;
  flex-direction:column;
}

/* Viewers placeholder */
#viewer{
  flex:1;
  background:#000;
  border-bottom:1px solid #111;
}

/* ================= TIMELINE ================= */
#timeline{
  height:280px;              /* ✅ hard boundary */
  display:flex;
  flex-direction:column;
  background:var(--bg);
  border-top:1px solid #111;
}

/* ================= RULER ================= */
#ruler{
  height:24px;
  background:linear-gradient(#1a1a1c,#151517);
  border-bottom:1px solid #111;
  overflow:hidden;
}

#ruler-inner{
  position:relative;
  height:100%;
  display:flex;
  width:10000px;
}

/* Ruler ticks */
.ruler-tick{
  height:100%;
  border-left:1px solid #333;
  position:relative;
}

.ruler-tick span{
  position:absolute;
  top:2px;
  left:4px;
  font-size:9px;
  color:#aaa;
}

/* ================= TIMELINE BODY ================= */
#timeline-body{
  flex:1;
  overflow:auto;
  position:relative;
}

#timeline-inner{
  position:relative;
  height:calc(var(--trackH) * 3);
  width:10000px;
  background:
    linear-gradient(to right, var(--grid) 1px, transparent 1px);
  background-size:var(--pxPerSec) 100%;
}

/* Tracks */
.track{
  height:var(--trackH);
  border-bottom:1px solid #151517;
  position:relative;
}

/* ================= TRACK HEADERS ================= */
#track-headers{
  position:absolute;
  left:0;
  top:0;
  width:180px;
  background:linear-gradient(#202022,#18181a);
  border-right:1px solid #111;
  z-index:5;
}

.track-header{
  height:var(--trackH);
  display:flex;
  align-items:center;
  padding:0 8px;
  border-bottom:1px solid #111;
}

.track-label{font-weight:bold}

.v2 .track-label{color:var(--v2)}
.v1 .track-label{color:var(--v1)}
.a1 .track-label{color:var(--a1)}

/* Offset timeline to account for headers */
#timeline-inner,
#ruler-inner{
  margin-left:180px;
}

/* ================= PLAYHEAD ================= */
#playhead{
  position:absolute;
  top:0;
  bottom:0;
  width:2px;
  background:var(--accent);
  left:180px;
  z-index:10;
}
</style>
</head>

<body>
<div id="app">

<!-- Browser -->
<div id="browser"></div>

<!-- Center -->
<div id="center">

  <div id="viewer"></div>

  <!-- Timeline -->
  <div id="timeline">

    <div id="ruler">
      <div id="ruler-inner"></div>
    </div>

    <div id="timeline-body">
      <div id="timeline-inner">

        <!-- Track headers -->
        <div id="track-headers">
          <div class="track-header v2"><span class="track-label">V2 Graphics</span></div>
          <div class="track-header v1"><span class="track-label">V1</span></div>
          <div class="track-header a1"><span class="track-label">A1</span></div>
        </div>

        <div id="playhead"></div>

        <div class="track"></div>
        <div class="track"></div>
        <div class="track"></div>

      </div>
    </div>

  </div>
</div>
</div>

<script>
/* Build ruler */
const pxPerSec = 100;
const rulerInner = document.getElementById("ruler-inner");

for(let i=0;i<120;i++){
  const tick = document.createElement("div");
  tick.className = "ruler-tick";
  tick.style.width = pxPerSec+"px";

  if(i%5===0){
    const s = document.createElement("span");
    s.textContent = `00:${String(i).padStart(2,"0")}:00:00`;
    tick.appendChild(s);
  }
  rulerInner.appendChild(tick);
}

/* Scroll sync */
const body = document.getElementById("timeline-body");
body.addEventListener("scroll",()=>{
  document.getElementById("ruler").scrollLeft = body.scrollLeft;
});
</script>

</body>
</html>
