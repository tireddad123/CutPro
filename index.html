<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>CutPro – Locked Layout</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<style>
:root{
  --bg:#0f0f10;
  --panel:#1c1c1e;
  --panel2:#242427;
  --panel3:#2b2b2e;
  --text:#d8d8d8;
  --muted:#9a9a9a;
  --grid:#2a2a2e;
  --accent:#f0b400;

  --browserW:240px;
  --timelineH:300px;
  --viewerHeaderH:26px;

  font-family:"Lucida Grande","Helvetica Neue",Arial,sans-serif;
  font-size:11px;
}

*{box-sizing:border-box}
html,body{
  margin:0;
  height:100%;
  background:var(--bg);
  color:var(--text);
  overflow:hidden;
}

/* ================= APP ================= */
#app{
  display:flex;
  height:100%;
}

/* ================= BROWSER ================= */
#browser{
  width:var(--browserW);
  background:linear-gradient(#202022,#18181a);
  border-right:1px solid #111;
  padding:8px;
}

#browser h3{
  margin:0 0 6px 0;
  font-size:10px;
  color:var(--muted);
  text-transform:uppercase;
}

/* ================= CENTER COLUMN ================= */
#center{
  flex:1;
  display:flex;
  flex-direction:column;
}

/* ================= VIEWERS ================= */
#viewers{
  flex:1;
  display:flex;
  gap:1px;
  background:#000;
}

/* Each viewer panel */
.viewer-panel{
  flex:1;
  display:flex;
  flex-direction:column;
  background:#000;
  border-right:1px solid #111;
}
.viewer-panel:last-child{border-right:none}

/* Viewer header */
.viewer-header{
  height:var(--viewerHeaderH);
  background:linear-gradient(#2a2a2c,#202022);
  border-bottom:1px solid #111;
  display:flex;
  align-items:center;
  padding:0 8px;
  font-size:10px;
  color:var(--muted);
  text-transform:uppercase;
}

/* Viewer canvas area */
.viewer-canvas{
  flex:1;
  position:relative;
  background:#000;
}

/* Overlay label */
.viewer-overlay{
  position:absolute;
  top:8px;
  left:8px;
  font-size:9px;
  color:#888;
  pointer-events:none;
}

/* ================= TIMELINE ================= */
#timeline{
  height:var(--timelineH);
  background:var(--bg);
  border-top:1px solid #111;
  display:flex;
  flex-direction:column;
}

/* Timeline header (optional controls later) */
#timeline-header{
  height:24px;
  background:linear-gradient(#1a1a1c,#151517);
  border-bottom:1px solid #111;
  display:flex;
  align-items:center;
  padding:0 8px;
  font-size:10px;
  color:var(--muted);
}

/* Timeline body placeholder */
#timeline-body{
  flex:1;
  background:linear-gradient(#131314,#0f0f10);
}
</style>
</head>

<body>
<div id="app">

<!-- ================= BROWSER ================= -->
<div id="browser">
  <h3>Browser</h3>
  <div>(media bin here)</div>
</div>

<!-- ================= CENTER ================= -->
<div id="center">

  <!-- ===== VIEWERS ===== -->
  <div id="viewers">

    <!-- SOURCE VIEWER -->
    <div class="viewer-panel">
      <div class="viewer-header">Viewer</div>
      <div class="viewer-canvas">
        <div class="viewer-overlay">SOURCE</div>
      </div>
    </div>

    <!-- CANVAS / PROGRAM -->
    <div class="viewer-panel">
      <div class="viewer-header">Canvas</div>
      <div class="viewer-canvas">
        <div class="viewer-overlay">SEQUENCE</div>
      </div>
    </div>

  </div>

  <!-- ===== TIMELINE ===== -->
  <div id="timeline">
    <div id="timeline-header">Timeline</div>
    <div id="timeline-body"></div>
  </div>

</div>
</div>
</body>
</html>
