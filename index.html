<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />

<title>Web NLE Editor</title>

<style>
/* =========================================================
   VARIABLES (variables.css)
   ========================================================= */
:root{
  --bg:#0f0f10;
  --panel:#1c1c1e;
  --panel2:#202022;
  --line:#111;
  --text:#d8d8d8;
  --muted:#8b8b8b;
  --accent:#3b82f6;

  --browserW:240px;
  --inspectorW:300px;
  --timelineH:260px;

  --trackH:48px;
  --pxPerSec:100px;
  --rulerH:22px;

  font-family:system-ui,-apple-system,Segoe UI,sans-serif;
}

/* =========================================================
   RESET (reset.css)
   ========================================================= */
*{ box-sizing:border-box; }

html, body{
  margin:0;
  height:100%;
  background:var(--bg);
  color:var(--text);
  overflow:hidden;

  /* ⚠️ Critical for momentum scroll suppression */
  overscroll-behavior:none;
}

/* =========================================================
   STRUCTURAL LAYOUT (layout.css – DO NOT STYLE)
   ========================================================= */
body{
  display:grid;
  grid-template-rows:42px 1fr var(--timelineH);
}

/* ⚠️ CRITICAL FLEX / GRID SAFETY */
#app,#viewers,#center,#browser,#inspector,#timeline .body{
  min-height:0;
  min-width:0;
}

#app{
  display:grid;
  grid-template-columns:var(--browserW) 1fr var(--inspectorW);
}

#center{
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

#viewers{
  flex:1;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:6px;
  padding:6px;
}

/* ⚠️ minmax required to prevent viewer stealing height */
.viewer-panel{
  display:grid;
  grid-template-rows:24px minmax(0,1fr) 56px;
  min-height:0;
  overflow:hidden;
}

.viewer-screen{
  display:flex;
  align-items:center;
  justify-content:center;
  height:100%;
  aspect-ratio:16 / 9;
  min-height:0;
  overflow:hidden;
}

#timeline{
  display:grid;
  grid-template-rows:30px 1fr;
}

#timeline .body{
  display:grid;
  grid-template-columns:180px 1fr;
  overflow:hidden;
}

.tracks{
  position:relative;
  overflow:auto;
  min-height:0;
  padding-top:var(--rulerH);
}

/* =========================================================
   COMPONENTS (components.css)
   ========================================================= */
/* Top Bar */
#topbar{
  display:grid;
  grid-template-columns:1fr auto 1fr;
  align-items:center;
  gap:8px;
  padding:0 10px;
  background:linear-gradient(#2a2a2c,#202022);
  border-bottom:1px solid var(--line);
}

#topbar .left,#topbar .right{
  display:flex;
  gap:6px;
  align-items:center;
}

#topbar .center{
  justify-self:center;
  font-family:monospace;
  color:#00dd00;
  font-weight:600;
}

.tool-btn{
  height:28px;
  min-width:28px;
  padding:0 8px;
  background:#2b2b2e;
  border:1px solid #000;
  color:#ddd;
  border-radius:4px;
  cursor:pointer;
}

.tool-btn.active{
  background:#1e3a5a;
  border-color:#0b274e;
}

/* Browser */
#browser{
  display:flex;
  flex-direction:column;
  border-right:1px solid var(--line);
  background:linear-gradient(#202022,#18181a);
}

.browser-header{
  padding:8px 10px;
  font-size:11px;
  text-transform:uppercase;
  color:var(--muted);
  border-bottom:1px solid var(--line);
}

#bin{
  flex:1;
  overflow:auto;
  padding:0 8px;
}

#drop-zone{
  margin:10px;
  padding:14px;
  border:2px dashed #3b6fa6;
  border-radius:6px;
  text-align:center;
  color:#8fb3d9;
}

/* Viewer visuals */
.viewer-panel{
  background:var(--panel);
  border:1px solid #111;
}

.panel-header{
  padding:0 8px;
  font-size:11px;
  color:var(--muted);
  display:flex;
  align-items:center;
  border-bottom:1px solid #0c0c0d;
}

.viewer-screen video,
.viewer-screen canvas{
  max-width:100%;
  max-height:100%;
  display:block;
}

/* Timeline */
#timeline{
  background:linear-gradient(#131314,#0f0f10);
  border-top:1px solid var(--line);
}

#timeline .controls{
  display:flex;
  align-items:center;
  padding:0 8px;
  gap:6px;
  font-size:11px;
  border-bottom:1px solid #141414;
}

#track-headers{
  background:linear-gradient(#202022,#18181a);
  border-right:1px solid var(--line);
}

.track-header{
  height:var(--trackH);
  display:flex;
  align-items:center;
  padding:0 8px;
  color:var(--muted);
  font-size:11px;
  border-bottom:1px solid var(--line);
}

.tracks{
  background:
    linear-gradient(#141414 1px, transparent 1px)
      top left/100% var(--trackH),
    linear-gradient(to right, #2a2a2e 1px, transparent 1px)
      top left/var(--pxPerSec) 100%;
}

.timeline-ruler{
  position:sticky;
  top:0;
  height:var(--rulerH);
  background:#1e1e1e;
  border-bottom:1px solid #0f0f10;
  z-index:3;
}

.timeline-track{
  height:var(--trackH);
  border-bottom:1px solid #191919;
}

/* =========================================================
   UTILITIES + DEBUG (utilities.css)
   ========================================================= */
body.debug-layout *{
  outline:1px dashed rgba(255,0,0,0.35);
}

body.debug-layout .viewer-panel{
  outline:2px solid cyan;
}

body.debug-layout .tracks{
  outline:2px solid yellow;
}

body.layout-error{
  outline:4px solid red;
}
</style>
</head>

<body>

<!-- =========================================================
     TOP BAR
     ========================================================= -->
<div id="topbar">
  <div class="left">
    <button class="tool-btn" id="btn-debug" title="Toggle Layout Debug">🧱</button>
  </div>
  <div class="center">00:00:00:00</div>
  <div class="right"></div>
</div>

<!-- =========================================================
     WORKSPACE
     ========================================================= -->
<div id="app">

  <aside id="browser">
    <div class="browser-header">Browser</div>
    <div id="bin"></div>
    <div id="drop-zone">Drop video here</div>
  </aside>

  <main id="center">
    <div id="viewers">
      <section class="viewer-panel">
        <div class="panel-header">Viewer · Source</div>
        <div class="viewer-screen">
          <video></video>
        </div>
        <div></div>
      </section>

      <section class="viewer-panel">
        <div class="panel-header">Canvas · Program</div>
        <div class="viewer-screen" id="program-screen">
          <canvas id="programCanvas"></canvas>
        </div>
        <div></div>
      </section>
    </div>
  </main>

  <aside id="inspector">
    <div class="browser-header">Inspector</div>
    <div>No selection</div>
  </aside>

</div>

<!-- =========================================================
     TIMELINE
     ========================================================= -->
<div id="timeline">
  <div class="controls">Timeline</div>
  <div class="body">
    <div id="track-headers">
      <div class="track-header">V1</div>
      <div class="track-header">A1</div>
    </div>
    <div class="tracks">
      <div class="timeline-ruler"></div>
      <div class="timeline-track"></div>
      <div class="timeline-track"></div>
    </div>
  </div>
</div>

<script>
/* =========================================================
   HiDPI NORMALIZATION
   ========================================================= */
function normalizeHiDPI(canvas, w, h){
  const dpr = Math.max(1, window.devicePixelRatio || 1);
  canvas.width  = Math.round(w * dpr);
  canvas.height = Math.round(h * dpr);
  canvas.style.width  = w + 'px';
  canvas.style.height = h + 'px';
  const ctx = canvas.getContext('2d');
  ctx.setTransform(dpr,0,0,dpr,0,0);
}

/* =========================================================
   LAYOUT ASSERTIONS
   ========================================================= */
function assertLayout(){
  const issues = [];
  const viewer = document.querySelector('.viewer-panel');
  const timeline = document.getElementById('timeline');

  if(viewer && viewer.offsetHeight < 150) issues.push('Viewer collapsed');
  if(timeline && timeline.offsetHeight < 200) issues.push('Timeline collapsed');

  document.body.classList.toggle('layout-error', issues.length > 0);
  if(issues.length) console.warn('Layout issues:', issues);
}

/* =========================================================
   WIRES
   ========================================================= */
document.getElementById('btn-debug').onclick = () =>
  document.body.classList.toggle('debug-layout');

window.addEventListener('resize', assertLayout);
requestAnimationFrame(() => {
  const c = document.getElementById('programCanvas');
  const s = document.getElementById('program-screen');
  normalizeHiDPI(c, s.clientWidth, s.clientHeight);
  assertLayout();
});
</script>

</body>
</html>
