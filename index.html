<title>CutPro Web</title>

<style>
/* ================= BASE ================= */
:root{
  --bg:#111;--panel:#1e1e1e;--panel2:#252525;
  --text:#d8d8d8;--muted:#888;
  --accent:#4a8fcd;--playhead:#e8a020;
  --snap:#ffcc00;
  font-family:"Lucida Grande","Helvetica Neue",Arial,sans-serif;
  font-size:11px;
}

html,body{margin:0;height:100%;overflow:hidden;background:var(--bg);color:var(--text)}
*{box-sizing:border-box}
#app{display:flex;flex-direction:column;height:100%}

/* ================= TOOLBAR ================= */
#toolbar{
  height:38px;display:flex;align-items:center;gap:6px;padding:0 8px;
  background:linear-gradient(#3a3a3a,#262626);border-bottom:1px solid #111
}
.tool-btn{height:26px;border-radius:3px;padding:0 8px;
  background:linear-gradient(#3e3e3e,#292929);
  border:1px solid #1a1a1a;border-top-color:#4a4a4a;
  color:var(--text);cursor:pointer
}
.tool-btn.active{
  background:linear-gradient(#1e3a5a,#162a42);
  border-color:var(--accent)
}
.tool-sep{width:1px;height:22px;background:#444;margin:0 4px}

/* ================= LAYOUT ================= */
#workspace{flex:1;display:flex}
#browser{width:240px;background:var(--panel);border-right:1px solid #111}
#center{flex:1;display:flex;flex-direction:column}

/* ================= BIN ================= */
.panel-header{
  height:20px;padding:0 8px;
  display:flex;align-items:center;font-size:10px;font-weight:bold;
  text-transform:uppercase;color:#aaa;
  background:linear-gradient(#333,#252525);border-bottom:1px solid #111
}
#bin{overflow:auto}
.bin-item{padding:4px 6px;border-bottom:1px solid #222;cursor:grab}

/* ================= VIEWERS ================= */
#viewers{flex:1;display:flex;border-bottom:2px solid #111}
.viewer-panel{flex:1;position:relative;background:#000}
.viewer-label{
  position:absolute;top:6px;left:8px;
  font-size:9px;color:rgba(255,255,255,.4)
}

/* ================= TIMELINE ================= */
#timeline{height:260px;background:#111;display:flex;flex-direction:column}
#timeline-toolbar{height:28px;padding:0 8px;
  display:flex;align-items:center;
  background:linear-gradient(#2e2e2e,#242424);border-bottom:1px solid #111}
#timeline-content{flex:1;display:flex}

#track-headers{width:120px;background:var(--panel2);border-right:1px solid #111}
.track-header{
  height:40px;display:flex;align-items:center;padding:0 6px;
  font-size:10px;color:#aaa;border-bottom:1px solid #111
}

#tracks{flex:1;position:relative;overflow:auto}
.timeline-ruler{height:20px;border-bottom:1px solid #222;background:#1a1a1a;display:flex;font-size:9px;color:#888}
.timeline-track{height:40px;border-bottom:1px solid #111;position:relative}

/* ================= CLIPS ================= */
.clip{
  position:absolute;top:4px;bottom:4px;
  padding:0 6px;border-radius:3px;
  font-size:9px;color:#fff;display:flex;
  align-items:center;cursor:grab;overflow:hidden
}
.clip.video{background:linear-gradient(#3a6a9a,#2a4e74,#1e3850);border:1px solid #1a3a6a}
.clip.audio{background:linear-gradient(#3a6a3a,#2a5028,#1e3c1e);border:1px solid #1a4a1a}

.clip.selected{outline:2px solid var(--accent)}

.edge{position:absolute;top:0;bottom:0;width:6px;cursor:ew-resize}
.edge.left{left:-3px}
.edge.right{right:-3px}

/* Waveform */
.wave{position:absolute;left:0;right:0;bottom:2px;height:18px;opacity:.7}

/* Transitions */
.transition{
  position:absolute;top:0;bottom:0;width:14px;
  background:linear-gradient(rgba(255,200,80,.9),rgba(200,120,0,.8));
  cursor:pointer;color:#000;font-size:8px;font-weight:bold;
  display:flex;align-items:center;justify-content:center
}
.transition.in{left:-7px;border-radius:3px 0 0 3px}
.transition.out{right:-7px;border-radius:0 3px 3px 0}

/* ================= PLAYHEAD + SNAP ================= */
#playhead{position:absolute;top:0;bottom:0;width:2px;background:var(--playhead);z-index:100}
#snap-guide{position:absolute;top:0;bottom:0;width:2px;background:var(--snap);display:none;z-index:90}

/* ================= EXPORT MODAL ================= */
#export-modal{position:fixed;inset:0;background:rgba(0,0,0,.75);
  display:none;align-items:center;justify-content:center;z-index:500}
#export-card{
  background:#1a1e28;border:1px solid #2a3040;border-radius:8px;
  width:460px;padding:16px
}
#export-card h2{margin:0 0 12px;font-size:14px}
.export-row{display:flex;gap:6px;margin-bottom:10px}
.export-row label{width:80px;font-size:10px;color:#aaa}
.export-actions{text-align:right;margin-top:12px}

/* ================= STATUS ================= */
#statusbar{
  height:18px;padding:0 8px;display:flex;align-items:center;
  background:linear-gradient(#1e1e1e,#161616);border-top:1px solid #111;
  font-size:9px;color:var(--muted)
}
</style>
</head>

We are adding **four production‑grade features**:

1. **Transitions logic (cross‑dissolve)**

# 🧠 Phase 6 Design Rules (Why this works)

- Transitions are **between two adjacent clips** → not standalone effects  
- Audio waveform is **informational**, not interactive (yet)  
- Audio fades reuse the **same fade model** as video  
- Snapping must be **visible**, not mysterious  

This mirrors Final Cut / Premiere behavior almost exactly.

  state.clips.forEach(c=>{
    if(c.type==='video' && c.video.readyState>=2){
      ctx.drawImage(c.video,0,0,canvas.width,canvas.height);
    }
  });
  requestAnimationFrame(draw);
})();

/* ================= INSPECTOR ================= */
aFadeIn.oninput=()=>state.selected&&(state.selected.fadeIn=parseFloat(aFadeIn.value),render());
aFadeOut.oninput=()=>state.selected&&(state.selected.fadeOut=parseFloat(aFadeOut.value),render());
</script>
</body>
