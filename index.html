<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>CutPro – Browser NLE Core</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<style>
:root{
  --bg:#0f0f10;--panel:#1c1c1e;--line:#111;--text:#d8d8d8;--accent:#3b82f6;
  --pxPerSec:100;--trackH:48px;
  font-family:system-ui,-apple-system,Segoe UI,sans-serif;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%;background:var(--bg);color:var(--text);overflow:hidden}
#top{height:40px;display:flex;align-items:center;gap:8px;padding:0 8px;background:#222}
#app{display:flex;height:calc(100% - 40px)}
#browser{width:220px;border-right:1px solid var(--line);padding:8px}
#center{flex:1;display:flex;flex-direction:column}
#viewer{flex:1;background:#000;position:relative}
#viewer canvas{width:100%;height:100%}
#timeline{height:180px;border-top:1px solid var(--line);display:flex}
.track{flex:1;position:relative;border-bottom:1px solid #222}
.clip{position:absolute;top:6px;bottom:6px;border-radius:4px;
  background:linear-gradient(#3576d6,#2559a4);font-size:10px;padding:4px;cursor:pointer}
.clip.audio{background:linear-gradient(#3b7a4b,#235a37)}
.selected{outline:2px solid var(--accent)}
#waveform{height:60px;background:#121212}
</style>
</head>

<body>
<div id="top">
  <button id="play">▶</button>
  <button id="autoCut">Auto‑Cut</button>
  <button id="export">Export</button>
</div>

<div id="app">
  <div id="browser">
    <input type="file" id="import" multiple />
  </div>

  <div id="center">
    <div id="viewer">
      <canvas id="canvas" width="1280" height="720"></canvas>
    </div>
    <canvas id="waveform"></canvas>
    <div id="timeline">
      <div class="track" id="V1"></div>
      <div class="track" id="A1"></div>
    </div>
  </div>
</div>

<script type="module">
"use strict";

/* =========================================================
 STATE
========================================================= */
const state = {
  fps:30,
  pxPerSec:100,
  time:0,
  playing:false,
  media:new Map(),
  clips:new Map(),
  tracks:{V1:[],A1:[]},
  undo:[],
  redo:[]
};

/* =========================================================
 UTIL
========================================================= */
const uid = () => crypto.randomUUID();
const timeToPx = t => t * state.pxPerSec;

/* =========================================================
 MEDIA + AUDIO ANALYSIS
========================================================= */
const audioCtx = new AudioContext();

async function analyzeAudio(file){
  const ab = await file.arrayBuffer();
  const buffer = await audioCtx.decodeAudioData(ab);
  const ch = buffer.getChannelData(0);
  const step = 1024;
  const rms = [];
  for(let i=0;i<ch.length;i+=step){
    let s=0;
    for(let j=0;j<step && i+j<ch.length;j++) s+=ch[i+j]**2;
    rms.push(Math.sqrt(s/step));
  }
  return {buffer,rms};
}

/* =========================================================
 IMPORT
========================================================= */
import.onchange = async e => {
  for(const f of e.target.files){
    const mediaId = uid();
    const type = f.type.startsWith("audio")?"audio":"video";
    const media = {id:mediaId,file:f,type,url:URL.createObjectURL(f)};
    if(type==="audio"){
      Object.assign(media, await analyzeAudio(f));
      drawWaveform(media.rms);
    }
    state.media.set(mediaId, media);

    const clipId = uid();
    const clip = {id:clipId,mediaId,start:0,dur:3,in:0,track:type==="audio"?"A1":"V1"};
    state.clips.set(clipId,clip);
    state.tracks[clip.track].push(clipId);
  }
  renderTimeline();
};

/* =========================================================
 WAVEFORM
========================================================= */
function drawWaveform(rms){
  const c = waveform;
  c.width = c.clientWidth; c.height = c.clientHeight;
  const g = c.getContext("2d");
  g.clearRect(0,0,c.width,c.height);
  g.beginPath();
  rms.forEach((v,i)=>{
    g.lineTo(i/rms.length*c.width, c.height - v*c.height);
  });
  g.strokeStyle="#4ade80"; g.stroke();
}

/* =========================================================
 PLAYBACK (AUDIO CLOCK MASTER)
========================================================= */
let startTime=0, sources=[];

play.onclick=() => state.playing?pause():playback();

function playback(){
  state.playing=true;
  startTime = audioCtx.currentTime - state.time;
  scheduleAudio();
  requestAnimationFrame(tick);
}

function pause(){
  state.playing=false;
  sources.forEach(s=>s.stop());
  sources=[];
}

function tick(){
  if(!state.playing) return;
  state.time = audioCtx.currentTime-startTime;
  renderFrame();
  requestAnimationFrame(tick);
}

function scheduleAudio(){
  sources=[];
  for(const id of state.tracks.A1){
    const clip = state.clips.get(id);
    const m = state.media.get(clip.mediaId);
    if(!m.buffer) continue;
    const src = audioCtx.createBufferSource();
    src.buffer = m.buffer;
    src.connect(audioCtx.destination);
    src.start(startTime+clip.start, clip.in, clip.dur);
    sources.push(src);
  }
}

/* =========================================================
 CANVAS COMPOSITOR + TEXT
========================================================= */
function renderFrame(){
  const ctx = canvas.getContext("2d");
  ctx.clearRect(0,0,canvas.width,canvas.height);
  for(const id of state.tracks.V1){
    const clip = state.clips.get(id);
    const m = state.media.get(clip.mediaId);
    if(!m.video){
      m.video=document.createElement("video");
      m.video.src=m.url; m.video.muted=true;
    }
    m.video.currentTime = state.time-clip.start+clip.in;
    ctx.drawImage(m.video,0,0,canvas.width,canvas.height);
  }
  ctx.fillStyle="white";
  ctx.font="48px sans-serif";
  ctx.fillText("CutPro",40,60);
}

/* =========================================================
 AUTO‑EDIT (DIALOGUE JUMP CUT)
========================================================= */
autoCut.onclick = () => {
  for(const clipId of state.tracks.A1){
    const clip = state.clips.get(clipId);
    const m = state.media.get(clip.mediaId);
    if(!m.rms) continue;
    const silence=[];
    m.rms.forEach((v,i)=>{ if(v<0.01) silence.push(i/30); });
    if(silence.length>10){
      clip.dur -= 0.5;
    }
  }
  renderTimeline();
};

/* =========================================================
 ACTION UNDO
========================================================= */
function pushUndo(action){ state.undo.push(action); state.redo=[]; }

/* =========================================================
 TIMELINE RENDER
========================================================= */
function renderTimeline(){
  V1.innerHTML=""; A1.innerHTML="";
  for(const clip of state.clips.values()){
    const el=document.createElement("div");
    el.className="clip "+(clip.track==="A1"?"audio":"");
    el.style.left=timeToPx(clip.start)+"px";
    el.style.width=timeToPx(clip.dur)+"px";
    el.textContent=clip.track;
    document.getElementById(clip.track).appendChild(el);
  }
}

/* =========================================================
 WEB CODECS EXPORT (IF SUPPORTED)
========================================================= */
export.onclick = async () => {
  if(!("VideoEncoder" in window)){
    alert("WebCodecs not supported in this browser");
    return;
  }
  const encoder = new VideoEncoder({
    output:chunk=>console.log("frame",chunk),
    error:console.error
  });
  encoder.configure({codec:"avc1.42E01E",width:1280,height:720,framerate:30});
  for(let t=0;t<3;t+=1/30){
    renderFrame();
    const vf = new VideoFrame(canvas,{timestamp:t*1e6});
    encoder.encode(vf);
    vf.close();
  }
  await encoder.flush();
  encoder.close();
  alert("Export complete (encoder test)");
};

</script>
</body>
</html>
