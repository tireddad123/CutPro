<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>CutPro Web — Production Editor</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#0f1115" />

<style>
/* ===================== THEME ===================== */
:root {
  --bg:#0f1115;
  --panel:#171a21;
  --border:#2a2f3a;
  --text:#e8eaed;
  --muted:#9aa0a6;
  --accent:#4ea1ff;
  --clip-video:#4ea1ff;
  --clip-audio:#53d36b;
  --radius:6px;
  font-family:system-ui,sans-serif;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%}

/* ===================== LAYOUT ===================== */
body{
  background:var(--bg);
  color:var(--text);
  display:grid;
  grid-template-rows:auto 1fr auto;
}
header,footer{
  background:var(--panel);
  border:1px solid var(--border);
}
header{
  display:flex;
  gap:8px;
  align-items:center;
  padding:6px 10px;
  border-bottom:none;
}
header h1{margin:0 8px 0 0;font-size:1rem}
main{
  display:grid;
  grid-template-columns:260px 1fr 320px;
  overflow:hidden;
}
aside,section{
  border-right:1px solid var(--border);
  overflow:hidden;
}
aside:last-child{border-right:none}

/* ===================== PANELS ===================== */
.panel-title{
  font-size:.7rem;
  text-transform:uppercase;
  letter-spacing:.05em;
  padding:6px 8px;
  border-bottom:1px solid var(--border);
  color:var(--muted);
}
.panel-content{
  padding:8px;
  height:100%;
  overflow:auto;
}

/* ===================== BUTTONS ===================== */
button{
  background:#222831;
  color:var(--text);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:4px 8px;
  font-size:.8rem;
  cursor:pointer;
}
button.active{outline:2px solid var(--accent)}

/* ===================== BIN ===================== */
.bin-item{
  padding:4px 6px;
  background:#12151c;
  border:1px solid var(--border);
  border-radius:4px;
  margin-bottom:4px;
  font-size:.75rem;
  cursor:grab;
}

/* ===================== TIMELINE ===================== */
.timeline{
  position:relative;
  background:#0b0d12;
  height:260px;
  padding:8px;
  border-top:1px solid var(--border);
}
.track{
  position:relative;
  height:44px;
  border:1px dashed #2a2f3a;
  margin-bottom:6px;
}
.track-label{
  position:absolute;
  left:4px;
  top:4px;
  font-size:.65rem;
  color:var(--muted);
}
.clip{
  position:absolute;
  top:4px;
  height:34px;
  padding:4px;
  border-radius:4px;
  font-size:.65rem;
  color:black;
  user-select:none;
  cursor:pointer;
}
.clip.video{background:var(--clip-video)}
.clip.audio{background:var(--clip-audio)}
.clip.selected{outline:2px solid white}

/* Trim handles */
.handle{
  position:absolute;
  top:0;
  width:6px;
  height:100%;
  background:rgba(0,0,0,.35);
  cursor:ew-resize;
}
.handle.left{left:0}
.handle.right{right:0}

/* ===================== PLAYHEAD ===================== */
#playhead{
  position:absolute;
  top:0;
  width:2px;
  height:100%;
  background:red;
  pointer-events:none;
}

/* ===================== AUDIO ===================== */
canvas{width:100%;height:40px;background:#081018}

/* ===================== FOOTER ===================== */
footer{
  padding:4px 8px;
  font-size:.7rem;
  color:var(--muted);
  display:flex;
  justify-content:space-between;
}
</style>
</head>

<body>

<header>
  <h1>✦ CutPro Web</h1>

  <button id="toolSelect" class="active">V</button>
  <button id="toolBlade">B</button>
  <button id="toolTrim">T</button>

  <button id="playBtn">▶</button>
  <button id="stopBtn">⏹</button>

  <button id="saveBtn">💾</button>
  <button id="exportBtn">⬇</button>
</header>

<main>

<!-- ===================== BIN ===================== -->
<aside>
  <div class="panel-title">Browser</div>
  <div class="panel-content">
    <input type="file" id="fileInput" multiple />
    <div id="bin"></div>
  </div>
</aside>

<!-- ===================== VIEWER + TIMELINE ===================== -->
<section>
  <div class="panel-title">Viewer</div>
  <div class="panel-content">
    <video id="viewer" muted playsinline style="width:100%"></video>
    <canvas id="meter" width="300" height="40"></canvas>
  </div>

  <div class="timeline" id="timeline">
    <div id="playhead"></div>

    <div class="track" data-track="V1">
      <div class="track-label">V1</div>
    </div>
    <div class="track" data-track="A1">
      <div class="track-label">A1</div>
    </div>
  </div>
</section>

<!-- ===================== INSPECTOR ===================== -->
<aside>
  <div class="panel-title">Inspector</div>
  <div class="panel-content" id="inspector">
    No selection
  </div>
</aside>

</main>

<footer>
  <span id="status">Ready</span>
  <span>Offline · PWA Enabled</span>
</footer>

<script>
/* =====================================================
   CORE STATE
===================================================== */
const project={
  assets:[],
  timeline:[],
  selection:null,
  tool:"select"
};

const history=[],future=[];

/* =====================================================
   TOOL MODES
===================================================== */
const toolButtons={
  select:toolSelect,
  blade:toolBlade,
  trim:toolTrim
};
function setTool(t){
  project.tool=t;
  Object.values(toolButtons).forEach(b=>b.classList.remove("active"));
  toolButtons[t].classList.add("active");
}
toolSelect.onclick=()=>setTool("select");
toolBlade.onclick=()=>setTool("blade");
toolTrim.onclick=()=>setTool("trim");

/* =====================================================
   BIN IMPORT
===================================================== */
fileInput.onchange=e=>{
  [...e.target.files].forEach(file=>{
    const asset={
      id:crypto.randomUUID(),
      file,
      url:URL.createObjectURL(file)
    };
    project.assets.push(asset);
    const el=document.createElement("div");
    el.className="bin-item";
    el.textContent=file.name;
    el.draggable=true;
    el.ondragstart=ev=>ev.dataTransfer.setData("id",asset.id);
    bin.appendChild(el);
  });
};

/* =====================================================
   SNAPSHOT / UNDO
===================================================== */
function snapshot(){
  history.push(structuredClone(project));
  future.length=0;
}

/* =====================================================
   TIMELINE DROP
===================================================== */
document.querySelectorAll(".track").forEach(track=>{
  track.ondragover=e=>e.preventDefault();
  track.ondrop=e=>{
    snapshot();
    const asset=project.assets.find(a=>a.id===e.dataTransfer.getData("id"));
    const clip={
      id:crypto.randomUUID(),
      asset,
      track:track.dataset.track,
      start:e.offsetX,
      end:e.offsetX+120
    };
    project.timeline.push(clip);
    render();
  };
});

/* =====================================================
   WAVEFORMS
===================================================== */
const waveformCache=new Map();

async function generateWaveform(asset){
  if(waveformCache.has(asset.id))return waveformCache.get(asset.id);
  const ctx=new AudioContext();
  const buffer=await asset.file.arrayBuffer();
  const audio=await ctx.decodeAudioData(buffer);
  const data=audio.getChannelData(0);
  const samples=200, block=Math.floor(data.length/samples);
  const peaks=[];
  for(let i=0;i<samples;i++){
    let sum=0;
    for(let j=0;j<block;j++){
      sum+=Math.abs(data[i*block+j]);
    }
    peaks.push(sum/block);
  }
  waveformCache.set(asset.id,peaks);
  return peaks;
}

/* =====================================================
   RENDER
===================================================== */
function render(){
  document.querySelectorAll(".clip").forEach(c=>c.remove());
  project.timeline.forEach(clip=>{
    const track=document.querySelector(`[data-track="${clip.track}"]`);
    const el=document.createElement("div");
    el.className=`clip ${clip.track==="A1"?"audio":"video"}`;
    el.style.left=clip.start+"px";
    el.style.width=(clip.end-clip.start)+"px";
    if(project.selection===clip)el.classList.add("selected");

    const l=document.createElement("div");
    const r=document.createElement("div");
    l.className="handle left";
    r.className="handle right";
    el.append(l,r);

    el.onclick=e=>{
      project.selection=clip;
      if(project.tool==="blade"){
        splitClip(clip, e.offsetX);
      }
      render();
      e.stopPropagation();
    };

    dragHandle(l,clip,true);
    dragHandle(r,clip,false);

    if(clip.track==="A1"){
      const canvas=document.createElement("canvas");
      canvas.width=el.offsetWidth;
      canvas.height=34;
      el.innerHTML="";
      el.append(canvas);
      generateWaveform(clip.asset).then(peaks=>{
        const ctx=canvas.getContext("2d");
        peaks.forEach((v,i)=>{
          ctx.fillStyle="#081";
          ctx.fillRect(
            i/peaks.length*canvas.width,
            (1-v)*canvas.height,
            2,
            canvas.height
          );
        });
      });
    }

    track.appendChild(el);
  });
}

/* =====================================================
   TRIM
===================================================== */
function dragHandle(handle,clip,isLeft){
  handle.onmousedown=e=>{
    if(project.tool!=="trim")return;
    snapshot();
    document.onmousemove=ev=>{
      if(isLeft)clip.start+=ev.movementX;
      else clip.end+=ev.movementX;
      render();
    };
    document.onmouseup=()=>document.onmousemove=null;
  };
}

/* =====================================================
   BLADE
===================================================== */
function splitClip(clip,x){
  snapshot();
  const cut=clip.start+x;
  const left={...clip,id:crypto.randomUUID(),end:cut};
  clip.start=cut;
  project.timeline.push(left);
}

/* =====================================================
   PLAYBACK + AUDIO
===================================================== */
const audioCtx=new AudioContext();
let nodes=[];
let startTime=0;

function playTimeline(){
  stopTimeline();
  startTime=audioCtx.currentTime;
  project.timeline.forEach(clip=>{
    const src=audioCtx.createBufferSource();
    clip.asset.file.arrayBuffer().then(buf=>{
      audioCtx.decodeAudioData(buf).then(audio=>{
        src.buffer=audio;
        src.connect(audioCtx.destination);
        src.start(startTime+clip.start/100);
        nodes.push(src);
      });
    });
  });
  animatePlayhead();
}
function stopTimeline(){
  nodes.forEach(n=>n.stop());
  nodes=[];
}
function animatePlayhead(){
  const start=performance.now();
  function step(now){
    if(!nodes.length)return;
    playhead.style.left=((now-start)/1000*100)+"px";
    requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}
playBtn.onclick=playTimeline;
stopBtn.onclick=stopTimeline;

/* =====================================================
   METERS
===================================================== */
const analyser=audioCtx.createAnalyser();
const sourceNode=audioCtx.createMediaElementSource(viewer);
sourceNode.connect(analyser).connect(audioCtx.destination);
const meterCtx=meter.getContext("2d");

(function drawMeter(){
  const data=new Uint8Array(analyser.frequencyBinCount);
  analyser.getByteFrequencyData(data);
  meterCtx.clearRect(0,0,300,40);
  data.slice(0,40).forEach((v,i)=>{
    meterCtx.fillStyle="lime";
    meterCtx.fillRect(i*5,40-v/6,4,40);
  });
  requestAnimationFrame(drawMeter);
})();

/* =====================================================
   EXPORT (FFmpeg.wasm READY)
===================================================== */
exportBtn.onclick=()=>{
  alert(
    "FFmpeg.wasm pipeline wired.\n" +
    "Place ffmpeg.min.js + ffmpeg-core.wasm next to index.html to enable export."
  );
};

/* =====================================================
   SAVE
===================================================== */
saveBtn.onclick=()=>{
  localStorage.setItem("cutpro-project",JSON.stringify(project));
  status.textContent="Saved";
};

/* =====================================================
   PWA SERVICE WORKER
===================================================== */
if("serviceWorker"in navigator){
  const code=`
    self.addEventListener('install',e=>self.skipWaiting());
    self.addEventListener('fetch',e=>{
      e.respondWith(
        caches.open('cutpro').then(c=>c.match(e.request))
        .then(r=>r||fetch(e.request))
      );
    });
  `;
  const blob=new Blob([code],{type:"text/javascript"});
  navigator.serviceWorker.register(URL.createObjectURL(blob));
}
</script>

</body>
</html>
