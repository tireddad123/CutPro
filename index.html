<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Timeline Prototype</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<style>
:root{
  --bg:#0e0e0e;
  --panel:#1a1a1a;
  --panel2:#222;
  --grid:#2b2b2b;
  --text:#ddd;
  --accent:#f0b400;
  --vColor:#3a6a9a;
  --gColor:#6b4bb6;
  --aColor:#3d6b3d;
  font-family: "Segoe UI", Arial, sans-serif;
  font-size:11px;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%;background:var(--bg);color:var(--text);overflow:hidden}

#app{
  display:flex;
  height:100%;
}

/* ───── Track Headers ───── */
#track-headers{
  width:180px;
  background:linear-gradient(#2a2a2a,#1e1e1e);
  border-right:1px solid #111;
}

.track-header{
  height:44px;
  display:flex;
  align-items:center;
  padding:0 8px;
  gap:6px;
  border-bottom:1px solid #111;
}

.track-header .label{
  flex:1;
  font-weight:bold;
}
.track-header.v2{background:#241c36}
.track-header.v1{background:#1b2736}
.track-header.a1{background:#1f2b1f}

.track-header button{
  width:18px;height:18px;
  background:#333;border:none;color:#aaa;
  border-radius:3px;cursor:pointer;
}

/* ───── Timeline Body ───── */
#timeline{
  flex:1;
  position:relative;
  overflow:auto;
  background:var(--bg)
}

.timeline-row{
  height:44px;
  position:relative;
  border-bottom:1px solid #111;
}

.timeline-grid{
  position:absolute;
  inset:0;
  background-image:
    linear-gradient(to right, var(--grid) 1px, transparent 1px);
  background-size:48px 100%;
  pointer-events:none;
}

/* ───── Playhead ───── */
#playhead{
  position:absolute;
  top:0;bottom:0;
  width:2px;
  left:4px;
  background:var(--accent);
  z-index:10;
}

/* ───── Clips ───── */
.clip{
  position:absolute;
  top:6px;
  bottom:6px;
  border-radius:4px;
  padding:0 6px;
  display:flex;
  align-items:center;
  font-size:10px;
  cursor:grab;
  color:#fff;
}
.clip.video{background:var(--vColor)}
.clip.graphics{background:var(--gColor)}
.clip.audio{background:var(--aColor)}
</style>
</head>

<body>
<div id="app">

<!-- TRACK HEADERS -->
<div id="track-headers">
  <div class="track-header v2">
    <span class="label">V2 GR</span>
    <button>➕</button>
    <button>🔒</button>
  </div>
  <div class="track-header v1">
    <span class="label">V1</span>
    <button>👁</button>
    <button>🔒</button>
  </div>
  <div class="track-header a1">
    <span class="label">A1</span>
    <button>🔊</button>
    <button>🔒</button>
  </div>
</div>

<!-- TIMELINE -->
<div id="timeline">
  <div class="timeline-grid"></div>
  <div id="playhead"></div>

  <div class="timeline-row" data-track="v2"></div>
  <div class="timeline-row" data-track="v1"></div>
  <div class="timeline-row" data-track="a1"></div>
</div>

</div>

<script>
/* Simple clip drop for demo */
document.querySelectorAll('.timeline-row').forEach(row=>{
  row.ondragover = e => e.preventDefault();
  row.ondrop = e => {
    const clip = document.createElement('div');
    clip.className = 'clip ' + (
      row.dataset.track === 'a1' ? 'audio' :
      row.dataset.track === 'v2' ? 'graphics' : 'video'
    );
    clip.textContent = 'Clip';
    clip.style.left = e.offsetX + 'px';
    clip.style.width = '140px';
    row.appendChild(clip);
  };
});
</script>
</body>
</html>
