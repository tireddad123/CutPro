<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>NLE Track System – Full Working Example</title>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>

<style>
:root{
  --bg:#0f0f10;
  --panel:#1c1c1e;
  --line:#111;
  --text:#ddd;
  --accent:#3b82f6;
  font-family:system-ui,-apple-system,Segoe UI,sans-serif;
}
*{box-sizing:border-box}
html,body{
  margin:0;
  height:100%;
  background:var(--bg);
  color:var(--text);
  overflow:hidden;
}

/* top controls */
#controls{
  padding:8px;
  border-bottom:1px solid var(--line);
  background:var(--panel);
}
#controls button{
  margin-right:6px;
}

/* layout */
#app{
  display:flex;
  height:calc(100% - 42px);
}

#trackHeaders{
  width:220px;
  background:#1a1a1c;
  border-right:1px solid var(--line);
}

#trackLanes{
  flex:1;
  background:#111;
}

/* track header */
.track-header{
  display:flex;
  align-items:center;
  gap:4px;
  padding:6px;
  border-bottom:1px solid var(--line);
  cursor:grab;
  position:relative;
}
.track-header.dragging{opacity:0.5}
.track-header span{
  width:40px;
}

.track-header button{
  width:22px;
  height:22px;
  background:#2b2b2e;
  border:1px solid var(--line);
  color:#ccc;
  cursor:pointer;
}
.track-header button.active{
  background:var(--accent);
  color:#fff;
}

.track-color{
  width:18px;
  height:18px;
  border:none;
  background:none;
  padding:0;
  cursor:pointer;
}

.resize-handle{
  position:absolute;
  bottom:0;
  left:0;
  right:0;
  height:6px;
  cursor:ns-resize;
}

/* track lane */
.track{
  position:relative;
  border-bottom:1px solid #222;
  overflow:hidden;
}
.track.muted{opacity:0.25}
.track.locked{pointer-events:none}

/* clip */
.clip{
  position:absolute;
  left:20px;
  top:6px;
  bottom:6px;
  width:120px;
  border-radius:4px;
  padding:4px;
  font-size:10px;
  color:#fff;
}
</style>
</head>

<body>

<div id="controls">
  <button onclick="addTrack('video')">+ Video Track</button>
  <button onclick="addTrack('audio')">+ Audio Track</button>
</div>

<div id="app">
  <div id="trackHeaders"></div>
  <div id="trackLanes"></div>
</div>

<script>
/* =========================
   STATE
========================= */
let videoTracks = [];
let audioTracks = [];
let draggedTrackId = null;

/* =========================
   TRACK MODEL
========================= */
function createTrack(type){
  return {
    id: crypto.randomUUID(),
    type,
    height: 48,
    collapsed: false,
    color: "#3b82f6",
    muted: false,
    solo: false,
    locked: false,
    clips: [
      { id: crypto.randomUUID(), name: "CLIP" }
    ]
  };
}

/* =========================
   ADD TRACK
========================= */
function addTrack(type){
  const track = createTrack(type);
  (type === "video" ? videoTracks : audioTracks).push(track);
  render();
}

/* =========================
   RENDER
========================= */
function render(){
  trackHeaders.innerHTML = "";
  trackLanes.innerHTML = "";

  const allTracks = [...videoTracks, ...audioTracks];
  const anySolo = allTracks.some(t => t.solo);

  allTracks.forEach((track, index) => {
    /* ---------- HEADER ---------- */
    const header = document.createElement("div");
    header.className = "track-header";
    header.style.borderLeft = `4px solid ${track.color}`;
    header.style.height = track.collapsed ? "28px" : track.height + "px";
    header.draggable = true;
    header.innerHTML = `
      <span>${track.type[0].toUpperCase()}${index + 1}</span>
      <input class="track-color" type="color" value="${track.color}">
      <button class="mute">M</button>
      <button class="solo">S</button>
      <button class="lock">🔒</button>
      <button class="collapse">${track.collapsed ? "▸" : "▾"}</button>
      <div class="resize-handle"></div>
    `;
    trackHeaders.appendChild(header);

    /* ---------- LANE ---------- */
    const lane = document.createElement("div");
    lane.className = "track";
    lane.style.height = track.collapsed ? "0px" : track.height + "px";

    if ((anySolo && !track.solo) || track.muted) {
      lane.classList.add("muted");
    }
    if (track.locked) {
      lane.classList.add("locked");
    }

    if (!track.collapsed) {
      track.clips.forEach(c => {
        const el = document.createElement("div");
        el.className = "clip";
        el.textContent = c.name;
        el.style.background = track.color;
        lane.appendChild(el);
      });
    }

    trackLanes.appendChild(lane);

    /* ---------- CONTROLS ---------- */
    header.querySelector(".track-color").oninput = e => {
      track.color = e.target.value;
      render();
    };
    header.querySelector(".mute").onclick = () => {
      track.muted = !track.muted;
      render();
    };
    header.querySelector(".solo").onclick = () => {
      track.solo = !track.solo;
      render();
    };
    header.querySelector(".lock").onclick = () => {
      track.locked = !track.locked;
      render();
    };
    header.querySelector(".collapse").onclick = () => {
      track.collapsed = !track.collapsed;
      render();
    };

    /* ---------- RESIZE ---------- */
    const handle = header.querySelector(".resize-handle");
    handle.onmousedown = e => {
      const startY = e.clientY;
      const startH = track.height;
      document.onmousemove = ev => {
        track.height = Math.max(32, startH + (ev.clientY - startY));
        render();
      };
      document.onmouseup = () => document.onmousemove = null;
    };

    /* ---------- DRAG REORDER ---------- */
    header.ondragstart = () => {
      draggedTrackId = track.id;
      header.classList.add("dragging");
    };
    header.ondragend = () => {
      draggedTrackId = null;
      header.classList.remove("dragging");
    };
    header.ondragover = e => e.preventDefault();
    header.ondrop = () => reorderTrack(track.id);
  });
}

/* =========================
   REORDER
========================= */
function reorderTrack(targetId){
  if (!draggedTrackId || draggedTrackId === targetId) return;

  const list =
    videoTracks.some(t => t.id === draggedTrackId) ?
    videoTracks : audioTracks;

  const from = list.findIndex(t => t.id === draggedTrackId);
  const to   = list.findIndex(t => t.id === targetId);

  const [moved] = list.splice(from, 1);
  list.splice(to, 0, moved);

  render();
}

/* =========================
   INIT
========================= */
videoTracks.push(createTrack("video"));
audioTracks.push(createTrack("audio"));
render();
</script>

</body>
</html>
