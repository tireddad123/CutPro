<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NLE Track Controls Demo</title>
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<style>
:root{
  --bg:#0f0f10;
  --panel:#1c1c1e;
  --line:#111;
  --text:#ddd;
  --accent:#3b82f6;
  --trackH:48px;
  font-family:system-ui;
}

*{box-sizing:border-box}
html,body{
  margin:0;height:100%;
  background:var(--bg);color:var(--text);
  overflow:hidden;
}

/* Layout */
#app{display:flex;height:100%}
#timeline{
  flex:1;
  display:flex;
  background:#111;
}

/* Track headers */
#headers{
  width:200px;
  background:#1a1a1c;
  border-right:1px solid var(--line);
}
.track-header{
  height:48px;
  display:flex;
  align-items:center;
  gap:4px;
  padding:0 6px;
  border-bottom:1px solid var(--line);
  cursor:grab;
  position:relative;
}
.track-header.dragging{opacity:.5}
.track-header.drag-over{outline:2px dashed var(--accent)}

.track-header span{width:32px}
.track-header button{
  width:22px;height:22px;
  background:#2b2b2e;
  border:1px solid var(--line);
  color:#ccc;
  cursor:pointer;
}
.track-header button.active{
  background:var(--accent);color:#fff;
}
.track-color{
  width:18px;height:18px;
  border:none;padding:0;
}

.resize-handle{
  position:absolute;
  bottom:0;left:0;right:0;
  height:6px;
  cursor:ns-resize;
}

/* Tracks */
#tracks{
  flex:1;
  position:relative;
}
.track{
  height:48px;
  border-bottom:1px solid #222;
  position:relative;
}
.track.muted{opacity:.25}
.track.locked{pointer-events:none}
.clip{
  position:absolute;
  top:6px;bottom:6px;
  width:120px;
  border-radius:4px;
  padding:4px;
  font-size:10px;
  color:#fff;
}

/* Buttons */
#controls{
  padding:8px;
  border-bottom:1px solid var(--line);
}
#controls button{margin-right:6px}
</style>
</head>

<body>

<div id="controls">
  <button id="addVideo">+ Video Track</button>
  <button id="addAudio">+ Audio Track</button>
</div>

<div id="app">
  <div id="headers"></div>
  <div id="timeline">
    <div id="tracks"></div>
  </div>
</div>

<script>
/* ===========================
   DATA MODEL
=========================== */
let videoTracks = [];
let audioTracks = [];
let draggedTrackId = null;

/* ===========================
   CREATE TRACK
=========================== */
function createTrack(type){
  return {
    id: crypto.randomUUID(),
    type,
    clips: [{ id: crypto.randomUUID(), start:20, width:120 }],
    muted:false,
    solo:false,
    locked:false,
    collapsed:false,
    height:48,
    color:"#3b82f6",
    dom:null,
    domHeader:null
  };
}

/* ===========================
   RENDER
=========================== */
function renderTracks(){
  headers.innerHTML="";
  tracks.innerHTML="";

  const all = [...videoTracks, ...audioTracks];

  all.forEach((track,i)=>{
    // HEADER
    const h=document.createElement("div");
    h.className="track-header";
    h.draggable=true;
    h.style.borderLeft=`4px solid ${track.color}`;
    h.dataset.id=track.id;
    h.innerHTML=`
      <span>${track.type[0].toUpperCase()}${i+1}</span>
      <input class="track-color" type="color" value="${track.color}">
      <button class="mute">M</button>
      <button class="solo">S</button>
      <button class="lock">🔒</button>
      <button class="collapse">${track.collapsed?"▸":"▾"}</button>
      <div class="resize-handle"></div>
    `;
    headers.appendChild(h);
    track.domHeader=h;

    // LANE
    const lane=document.createElement("div");
    lane.className="track";
    lane.style.height=track.collapsed?"0px":track.height+"px";
    if (track.collapsed) lane.style.display="none";
    tracks.appendChild(lane);
    track.dom=lane;

    // CLIPS
    track.clips.forEach(c=>{
      const el=document.createElement("div");
      el.className="clip";
      el.style.left=c.start+"px";
      el.style.width=c.width+"px";
      el.style.background=track.color;
      el.textContent="CLIP";
      lane.appendChild(el);
    });

    /* ---- controls ---- */
    h.querySelector(".mute").onclick=()=>{
      track.muted=!track.muted;
      h.querySelector(".mute").classList.toggle("active",track.muted);
      lane.classList.toggle("muted",track.muted);
    };
    h.querySelector(".solo").onclick=()=>{
      track.solo=!track.solo;
      h.querySelector(".solo").classList.toggle("active",track.solo);
      updateSolo();
    };
    h.querySelector(".lock").onclick=()=>{
      track.locked=!track.locked;
      h.querySelector(".lock").classList.toggle("active",track.locked);
      lane.classList.toggle("locked",track.locked);
    };
    h.querySelector(".collapse").onclick=()=>{
      track.collapsed=!track.collapsed;
      renderTracks();
    };
    h.querySelector(".track-color").oninput=e=>{
      track.color=e.target.value;
      renderTracks();
    };

    // RESIZE
    const rh=h.querySelector(".resize-handle");
    rh.onmousedown=e=>{
      const startY=e.clientY;
      const startH=track.height;
      document.onmousemove=ev=>{
        track.height=Math.max(32,startH+(ev.clientY-startY));
        track.dom.style.height=track.height+"px";
        track.domHeader.style.height=track.height+"px";
      };
      document.onmouseup=()=>document.onmousemove=null;
    };

    // DRAG REORDER
    h.ondragstart=()=>{
      draggedTrackId=track.id;
      h.classList.add("dragging");
    };
    h.ondragend=()=>{
      draggedTrackId=null;
      h.classList.remove("dragging");
    };
    h.ondragover=e=>e.preventDefault();
    h.ondrop=()=>{
      reorderTrack(track.id);
    };
  });
}

/* ===========================
   SOLO LOGIC
=========================== */
function updateSolo(){
  const soloed=[...videoTracks,...audioTracks].filter(t=>t.solo);
  [...videoTracks,...audioTracks].forEach(t=>{
    const active=soloed.length?soloed.includes(t):!t.muted;
    t.dom.style.opacity=active?1:.2;
  });
}

/* ===========================
   REORDER
=========================== */
function reorderTrack(targetId){
  if(!draggedTrackId||draggedTrackId===targetId)return;

  let list = videoTracks.some(t=>t.id===draggedTrackId)
    ? videoTracks : audioTracks;

  const from=list.findIndex(t=>t.id===draggedTrackId);
  const to=list.findIndex(t=>t.id===targetId);
  const [m]=list.splice(from,1);
  list.splice(to,0,m);
  renderTracks();
}

/* ===========================
   ADD TRACKS
=========================== */
addVideo.onclick=()=>{
  videoTracks.push(createTrack("video"));
  renderTracks();
};
addAudio.onclick=()=>{
  audioTracks.push(createTrack("audio"));
  renderTracks();
};

/* INIT */
videoTracks.push(createTrack("video"));
audioTracks.push(createTrack("audio"));
renderTracks();
</script>
</body>
</html>
