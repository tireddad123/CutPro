<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>CutPro – Inspector Wired</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<style>
:root{
  --bg:#0f0f10;
  --panel:#1c1c1e;
  --panel2:#242427;
  --line:#111;
  --text:#d8d8d8;
  --muted:#9a9a9a;
  --accent:#3b82f6;

  --browserW:240px;
  --inspectorW:260px;
  --timelineH:280px;
  --trackH:48px;
  --pxPerSec:100px;

  font-family:"Lucida Grande","Helvetica Neue",Arial,sans-serif;
  font-size:11px;
}

*{box-sizing:border-box}
html,body{margin:0;height:100%;background:var(--bg);color:var(--text);overflow:hidden;
  display:flex;flex-direction:column}

/* ========== TOP TOOLBAR ========== */
#topbar{
  height:38px;
  background:linear-gradient(#2a2a2c,#202022);
  border-bottom:1px solid var(--line);
  display:flex;
  align-items:center;
  padding:0 8px;
  gap:6px;
}
.tool-btn{
  width:30px;height:30px;
  background:#2b2b2e;
  border:1px solid var(--line);
  border-radius:4px;
  color:#ccc;
  cursor:pointer;
}
.tool-btn.active{
  background:#1e3a5a;
  border-color:var(--accent);
  color:#fff;
}

/* ========== MAIN APP ========== */
#app{flex:1;display:flex}

/* ========== BROWSER ========== */
#browser{
  width:var(--browserW);
  background:linear-gradient(#202022,#18181a);
  border-right:1px solid var(--line);
  display:flex;
  flex-direction:column;
}
.browser-header{
  padding:8px;
  font-size:10px;
  text-transform:uppercase;
  color:var(--muted);
}
#drop-zone{
  margin:8px;
  padding:16px;
  border:2px dashed #3b6fa6;
  border-radius:4px;
  color:#8fb3d9;
  text-align:center;
}
#bin{flex:1;overflow:auto}
.bin-item{padding:6px 8px;border-bottom:1px solid #222;cursor:grab}

/* ========== CENTER COLUMN ========== */
#center{flex:1;display:flex;flex-direction:column}

/* ========== VIEWERS ========== */
#viewers{flex:1;display:flex;border-bottom:1px solid var(--line)}
.viewer{flex:1;display:flex;flex-direction:column;border-right:1px solid var(--line)}
.viewer:last-child{border-right:none}
.viewer-header{
  height:26px;background:linear-gradient(#2a2a2c,#202022);
  border-bottom:1px solid var(--line);
  padding:0 8px;
  display:flex;align-items:center;
  font-size:10px;color:var(--muted)
}
.viewer-canvas{flex:1;background:#000;position:relative}
.viewer-label{position:absolute;top:8px;left:8px;font-size:9px;color:#888}

/* ========== TIMELINE ========== */
#timeline{
  height:var(--timelineH);
  background:linear-gradient(#131314,#0f0f10);
  border-top:1px solid var(--line);
  display:flex;
}
#track-headers{
  width:180px;
  background:linear-gradient(#202022,#18181a);
  border-right:1px solid var(--line);
}
.track-header{
  height:var(--trackH);
  display:flex;align-items:center;
  padding:0 8px;
  border-bottom:1px solid var(--line);
}
.tracks{
  flex:1;
  position:relative;
}
.track{
  height:var(--trackH);
  border-bottom:1px solid #1a1a1a;
  position:relative;
}
.clip{
  position:absolute;
  top:6px;bottom:6px;
  border-radius:4px;
  background:#2563eb;
  padding:0 8px;
  display:flex;align-items:center;
  cursor:pointer;
}
.clip.selected{outline:2px solid var(--accent)}

/* ========== INSPECTOR ========== */
#inspector{
  width:var(--inspectorW);
  background:linear-gradient(#202022,#18181a);
  border-left:1px solid var(--line);
  display:flex;
  flex-direction:column;
}
.inspector-header{
  padding:8px;
  font-size:10px;
  text-transform:uppercase;
  color:var(--muted);
  border-bottom:1px solid var(--line);
}
.inspector-body{
  padding:8px;
}
.inspector-row{
  margin-bottom:10px;
}
.inspector-row label{
  display:block;
  font-size:10px;
  color:var(--muted);
  margin-bottom:4px;
}
.inspector-row input{
  width:100%;
}
</style>
</head>

<body>

<!-- TOPBAR -->
<div id="topbar">
  <button class="tool-btn active">⬆</button>
  <button class="tool-btn">✂</button>
</div>

<div id="app">

<!-- BROWSER -->
<div id="browser">
  <div class="browser-header">Browser</div>
  <div id="drop-zone">Drop files here</div>
  <div id="bin"></div>
</div>

<!-- CENTER -->
<div id="center">
  <div id="viewers">
    <div class="viewer">
      <div class="viewer-header">Viewer</div>
      <div class="viewer-canvas"><div class="viewer-label">SOURCE</div></div>
    </div>
    <div class="viewer">
      <div class="viewer-header">Canvas</div>
      <div class="viewer-canvas"><div class="viewer-label">SEQUENCE</div></div>
    </div>
  </div>

  <div id="timeline">
    <div id="track-headers">
      <div class="track-header">V1</div>
    </div>
    <div class="tracks">
      <div class="track" id="track-v1"></div>
    </div>
  </div>
</div>

<!-- INSPECTOR -->
<div id="inspector">
  <div class="inspector-header">Inspector</div>
  <div class="inspector-body" id="inspectorBody">
    <div style="color:#777">No selection</div>
  </div>
</div>

</div>

<script>
/* ================= STATE ================= */
let selectedClip = null;
const pxPerSec = 100;

/* ================= TIMELINE DEMO CLIP ================= */
const clip = {
  id: crypto.randomUUID(),
  name: "Example Clip",
  start: 1,
  dur: 3,
  opacity: 1
};

const track = document.getElementById("track-v1");
const clipEl = document.createElement("div");
clipEl.className = "clip";
clipEl.textContent = clip.name;
clipEl.style.left = (clip.start * pxPerSec) + "px";
clipEl.style.width = (clip.dur * pxPerSec) + "px";

clipEl.onclick = () => selectClip(clip, clipEl);
track.appendChild(clipEl);

/* ================= SELECTION ================= */
function selectClip(c, el){
  document.querySelectorAll(".clip").forEach(x=>x.classList.remove("selected"));
  el.classList.add("selected");
  selectedClip = c;
  renderInspector();
}

/* ================= INSPECTOR ================= */
function renderInspector(){
  const panel = document.getElementById("inspectorBody");
  panel.innerHTML = "";

  if(!selectedClip){
    panel.innerHTML = "<div style='color:#777'>No selection</div>";
    return;
  }

  panel.innerHTML = `
    <div class="inspector-row">
      <label>Name</label>
      <input type="text" value="${selectedClip.name}" disabled>
    </div>
    <div class="inspector-row">
      <label>Start (seconds)</label>
      <input type="number" step="0.1" value="${selectedClip.start}">
    </div>
    <div class="inspector-row">
      <label>Duration (seconds)</label>
      <input type="number" step="0.1" value="${selectedClip.dur}">
    </div>
    <div class="inspector-row">
      <label>Opacity</label>
      <input type="range" min="0" max="1" step="0.01" value="${selectedClip.opacity}">
    </div>
  `;

  const inputs = panel.querySelectorAll("input");
  inputs[1].oninput = e=>{
    selectedClip.start = parseFloat(e.target.value);
    clipEl.style.left = (selectedClip.start * pxPerSec) + "px";
  };
  inputs[2].oninput = e=>{
    selectedClip.dur = parseFloat(e.target.value);
    clipEl.style.width = (selectedClip.dur * pxPerSec) + "px";
  };
  inputs[3].oninput = e=>{
    selectedClip.opacity = parseFloat(e.target.value);
    clipEl.style.opacity = selectedClip.opacity;
  };
}
</script>

</body>
</html>
