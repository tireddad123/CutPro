
<!DOCTYPE html>
<html lang='en'>
<head>
  <meta charset='UTF-8'>
  <meta name='viewport' content='width=device-width, initial-scale=1.0'>
  <title>CutPro Web – Fully Patched Index</title>
  <link rel='stylesheet' href='merged.css'>
</head>
<body>
  <!-- FULL PATCHED INDEX: CLEANED + FIXED UI REGIONS -->
  <div id='app'>

    <!-- MENU BAR -->
    <div id='menubar'>CutPro Web</div>

    <!-- WORKSPACE -->
    <div id='workspace'>

      <!-- BROWSER PANEL -->
      <div id='browser'>
        <div class='panel-header'>Browser</div>
        <div class='panel-tabs'>
          <div class='panel-tab active' id='tab-bin'>Bin</div>
          <div class='panel-tab' id='tab-effects'>Effects</div>
          <div class='panel-tab' id='tab-music'>Music</div>
        </div>

        <!-- Panels -->
        <div id='bin-list' class='open'></div>
        <div id='effects-panel'></div>
        <div id='music-library'></div>

        <!-- DROP ZONE -->
        <div id='drop-zone'>Drop files or click to import<input type='file' multiple></div>
      </div>

      <!-- CENTER (Viewers + Timeline) -->
      <div id='center'>
        <div id='viewers'>
          <div class='viewer-panel'>
            <div class='panel-header'>Source Viewer</div>
          </div>
          <div class='viewer-panel'>
            <div class='panel-header'>Canvas Viewer</div>
          </div>
        </div>
        <div id='timeline-area'>Timeline</div>
      </div>

      <!-- INSPECTOR -->
      <div id='inspector'>Inspector</div>

    </div> <!-- /workspace -->

  </div> <!-- /app -->

  <!-- DRAG OVERLAY -->
  <div id='drag-overlay'>Drop to import…</div>

  <!-- JS MERGED BUNDLE -->
  <script src='merged.js'></script>

</body>
</html>
